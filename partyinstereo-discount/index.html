  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100dvh;
      background: #111;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.4s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 55vw;
      max-width: 240px;
    }

    #page {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      padding: 16px 12px 8px;
      gap: 12px;
    }

    #logo {
      flex-shrink: 0;
      height: 36px;
      width: auto;
      opacity: 0.9;
    }

    #flyer {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #flyer img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
  </style>
